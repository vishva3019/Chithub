<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitHub - Authentication</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .premium-bg {
            background-color: #0b0f19;
            background-image: 
                radial-gradient(at 50% 50%, rgba(79, 70, 229, 0.12) 0px, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
            background-size: 100% 100%, 40px 30px, 40px 40px;
        }
    </style>
</head>
<body class="premium-bg text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="max-w-md w-full bg-slate-950/50 border border-slate-800/80 p-8 rounded-3xl shadow-2xl backdrop-blur-xl relative overflow-hidden">
        
        <div class="text-center space-y-2 mb-6">
            <h1 class="text-3xl font-black bg-gradient-to-r from-indigo-400 via-purple-400 to-cyan-400 bg-clip-text text-transparent tracking-tight">ChitHub</h1>
            <p class="text-xs text-slate-400 tracking-wide uppercase font-semibold">Digital Community Savings Portal</p>
        </div>

        <!-- LOGIN FORM NODE CARD -->
        <div id="login-panel" class="space-y-4">
            <h3 class="text-sm font-bold text-slate-300 uppercase tracking-widest border-b border-slate-900 pb-2">Account Login Gateway</h3>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Mobile Phone Number</label>
                <input type="text" id="login-phone" placeholder="9876543210" class="w-full bg-slate-900/60 border border-slate-800 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500 font-mono">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Account Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" class="w-full bg-slate-900/60 border border-slate-800 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500">
            </div>
            <button onclick="executeLogin()" class="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 text-white font-black py-3 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/10 active:scale-[0.99] transition-all mt-2">Verify & Enter Hub</button>
            <p class="text-center text-xs text-slate-500 mt-4 font-semibold">New here? <button onclick="togglePanels()" class="text-indigo-400 hover:underline">Create a savings profile</button></p>
        </div>

        <!-- SIGNUP FORM NODE CARD -->
        <div id="signup-panel" class="space-y-4 hidden">
            <h3 class="text-sm font-bold text-slate-300 uppercase tracking-widest border-b border-slate-900 pb-2">Membership Profile</h3>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Full Legal Name</label>
                <input type="text" id="reg-name" placeholder="e.g. Anand" class="w-full bg-slate-900/60 border border-slate-800 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Mobile Phone Number</label>
                <input type="text" id="reg-phone" placeholder="9538427685" class="w-full bg-slate-900/60 border border-slate-800 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500 font-mono">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Choose Account Password</label>
                <input type="password" id="reg-pass" placeholder="••••••••" class="w-full bg-slate-900/60 border border-slate-800 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-wider">Secret Chit Scheme Access Code</label>
                <input type="text" id="reg-code" placeholder="GRAMA2026" class="w-full bg-slate-900/60 border border-slate-800 p-3 rounded-xl text-sm text-white outline-none focus:border-indigo-500 font-mono uppercase">
            </div>
            <button onclick="executeRegistration()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl text-xs uppercase tracking-widest transition-all mt-2 shadow-md">Submit Registration Profile</button>
            <p class="text-center text-xs text-slate-500 mt-4 font-semibold">Already registered a profile? <button onclick="togglePanels()" class="text-indigo-400 hover:underline">Return to Login</button></p>
        </div>

    </div>

    <script>
        function togglePanels() {
            document.getElementById('login-panel').classList.toggle('hidden');
            document.getElementById('signup-panel').classList.toggle('hidden');
        }

        async function executeLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const password = document.getElementById('login-pass').value.trim();
            if(!phone || !password) return alert("Please fill out your credentials.");

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                if(data.success) { window.location.href = data.redirect; }
                else { alert(data.message || "Invalid credentials."); }
            } catch(e) { alert("Network connection failure."); }
        }

        async function executeRegistration() {
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const password = document.getElementById('reg-pass').value.trim();
            const access_code = document.getElementById('reg-code').value.trim();

            if(!name || !phone || !password || !access_code) return alert("Please populate all profile creation fields.");

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, phone, password, access_code })
                });
                
                const responseText = await res.text();
                let data;
                
                try {
                    data = JSON.parse(responseText);
                } catch(jsonParseError) {
                    return alert("⚠️ Database Schema Mismatch Error:\n\n" + responseText.substring(0, 300));
                }

                if(res.status === 201 || data.success) {
                    alert("🎉 Registration profile mapped successfully! Please log in.");
                    togglePanels();
                    document.getElementById('login-phone').value = phone;
                } else {
                    alert("❌ Rejection: " + (data.message || "Registration parameter error."));
                }
            } catch(e) { 
                alert("Communication block: Packet submission processing network failure."); 
            }
        }
    </script>
</body>
</html>
